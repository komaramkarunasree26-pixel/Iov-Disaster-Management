<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoV MSDA - Register Node</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: #00d2ff;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.5);
        }
        .btn-register {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-register:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h3 class="fw-bold">Node Registration</h3>
        <p class="text-muted small">Register a new Vehicle, UAV, or RSU to the Decentralized Network</p>
    </div>
    
    <form action="/register" method="POST">
        <div class="mb-3">
            <label class="form-label small text-uppercase">Node Identifier (Username)</label>
            <input type="text" name="username" class="form-control" placeholder="e.g. RSU_ZONE_01" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label small text-uppercase">Access Key (Password)</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4">
            <label class="form-label small text-uppercase">Confirm Access Key</label>
            <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-register">Initialize Node</button>
        </div>
    </form>
    
    <div class="text-center">
        <p class="small text-muted mb-0">Already registered? <a href="/" class="text-info text-decoration-none">Return to Secure Login</a></p>
    </div>
</div>

</body>
</html>
